    <style>
        body {
            font-family: 'Times New Roman', 'serif', 'Hiragino Mincho ProN';
            margin: 0; padding: 0; min-height: 100vh; color: #fff;
            /* 黄金の輝きを再現したグラデーション */
            background: radial-gradient(circle at center, #f39c12 0%, #d35400 70%, #2c3e50 100%);
            background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }
        .container { max-width: 600px; width: 90%; margin: 60px auto 40px; text-align: center; z-index: 10; }
        .kin-card {
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 30px;
            padding: 30px 20px; margin-bottom: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .kin-label { font-size: 0.8rem; letter-spacing: 0.4em; color: #fff; opacity: 0.9; }
        .kin-number { font-size: 3.5rem; font-weight: bold; margin: 10px 0; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
        .kin-details { font-size: 1.4rem; color: #fff; letter-spacing: 0.1em; }
        
        h1 { font-size: 1.7rem; margin: 25px 0 10px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .title-sub { font-size: 0.9rem; display: block; margin-bottom: 5px; color: #f1c40f; font-weight: bold; }

        .profile { font-size: 0.95rem; line-height: 1.8; margin-bottom: 40px; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            text-decoration: none; padding: 16px; border-radius: 50px; font-weight: bold;
            transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.4); text-align: center;
        }
        .btn-main { background: #e67e22; color: white; border: none; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        .btn-sub { background: rgba(255, 255, 255, 0.15); color: white; }
        footer { margin-top: auto; padding: 30px; font-size: 0.7rem; color: rgba(255,255,255,0.6); z-index: 5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="kin-card">
            <div class="kin-label">— Today's Energy —</div>
            <div id="kin-display" class="kin-number">KIN ---</div>
            <div id="kin-details" class="kin-details">銀河の音と紋章</div>
        </div>
        
        <h1>
            <span class="title-sub">マヤ暦アドバイザー</span>
            儷和（レイカ）

        <div class="profile">
            宇宙の巡り、魂の航海図を読み解き、本来の輝きを取り戻すお手伝いをいたします。<br>
            右下の案内人「マニク」も、あなたの旅をサポートします。
        </div>
        <div class="btn-group">
            <a href="#" class="btn btn-main">🔮 個人鑑定（準備中）</a>
            <a href="https://note.com/" target="_blank" class="btn btn-sub">📝 儷和のnote（準備中）</a>

    <footer>&copy; 2026 REIKA - Galactic Mayan Astrology</footer>

    <script>
        const solarSeals = ["赤い龍", "白い風", "青い夜", "黄色い種", "赤い蛇", "白い世界の橋渡し", "青い手", "黄色い星", "赤い月", "白い犬", "青い猿", "黄色い人", "赤い空歩く者", "白い魔法使い", "青い嵐", "黄色い太陽", "赤い地球", "白い鏡", "青い夜明け", "黄色い戦士"];
        function updateKin() {
            const baseDate = new Date('2023-02-04');
            const today = new Date();
            const diff = Math.floor((today - baseDate) / (1000 * 60 * 60 * 24));
            let kin = (diff % 260) + 1;
            if (kin <= 0) kin += 260;
            let tone = kin % 13; if (tone === 0) tone = 13;
            let sealIndex = (kin - 1) % 20;
            let seal = solarSeals[sealIndex];
            document.getElementById('kin-display').innerText = "KIN " + kin;
            document.getElementById('kin-details').innerText = seal + " / 音" + tone;
        }
        updateKin();
    </script>
