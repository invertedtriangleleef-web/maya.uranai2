<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マヤ暦アドバイザー 儷和（レイカ）- 公式サイト</title>
    <style>
        body {
            font-family: 'Times New Roman', 'serif', 'Hiragino Mincho ProN';
            margin: 0; padding: 0; min-height: 100vh; color: #4a4a4a; /* 画像に合わせて少し柔らかい黒に */
            /* 【重要】理想の画像を背景に設定 */
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* 画像が明るいので、文字を読みやすくするための薄いベール */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2); z-index: 1;
        }

        .container { max-width: 600px; width: 90%; margin: 60px auto 40px; text-align: center; z-index: 10; }

        .kin-card {
            /* カードを極限まで透明にし、背景の紋章を透かせる */
            background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 30px;
            padding: 30px 20px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .kin-label { font-size: 0.8rem; letter-spacing: 0.4em; color: #8d6e63; text-transform: uppercase; }
        .kin-number { font-size: 3.5rem; font-weight: bold; margin: 10px 0; color: #5d4037; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        .kin-details { font-size: 1.4rem; color: #5d4037; letter-spacing: 0.1em; }

        h1 { font-size: 1.6rem; margin: 25px 0 10px; color: #3e2723; text-shadow: 1px 1px 1px rgba(255,255,255,0.9); }
        .title-sub { font-size: 0.9rem; display: block; margin-bottom: 5px; color: #8d6e63; font-weight: bold; }

        .profile { font-size: 0.95rem; line-height: 1.9; margin-bottom: 40px; color: #4e342e; font-weight: 500; }
        
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            text-decoration: none; padding: 18px; border-radius: 50px; font-weight: bold;
            transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.6); text-align: center;
            backdrop-filter: blur(5px);
        }
        /* 画像の黄金色に合わせたボタンカラー */
        .btn-main { background: #e6a11e; color: white; border: none; box-shadow: 0 5px 15px rgba(230, 161, 30, 0.3); }
        .btn-sub { background: rgba(255, 255, 255, 0.4); color: #5d4037; }

        footer { margin-top: auto; padding: 30px; font-size: 0.7rem; color: #8d6e63; z-index: 10; }
    </style>
</head>
<body>
    <div class="container">
        <div class="kin-card">
            <div class="kin-label">— Today's Energy —</div>
            <div id="kin-display" class="kin-number">KIN ---</div>
            <div id="kin-details" class="kin-details">銀河の音と紋章</div>
        </div>
        
        <h1>
            <span class="title-sub">マヤ暦アドバイザー</span>
            儷和（レイカ）
        </h1>
        
        <div class="profile">
            宇宙の巡り、魂の航海図を読み解き、本来の輝きを取り戻すお手伝いをいたします。<br>
            右下の案内人「マニク」も、あなたの旅をサポートします。
        </div>

        <div class="btn-group">
            <a href="#" class="btn btn-main">🔮 個人鑑定（準備中）</a>
            <a href="https://note.com/" target="_blank" class="btn btn-sub">📝 儷和のnote（準備中）</a>
        </div>
    </div>

    <footer>&copy; 2026 REIKA - Galactic Mayan Astrology</footer>

    <script>
        const solarSeals = ["赤い龍", "白い風", "青い夜", "黄色い種", "赤い蛇", "白い世界の橋渡し", "青い手", "黄色い星", "赤い月", "白い犬", "青い猿", "黄色い人", "赤い空歩く者", "白い魔法使い", "青い嵐", "黄色い太陽", "赤い地球", "白い鏡", "青い夜明け", "黄色い戦士"];
        function updateKin() {
            const baseDate = new Date('2023-02-04');
            const today = new Date();
            const diff = Math.floor((today - baseDate) / (1000 * 60 * 60 * 24));
            let kin = (diff % 260) + 1;
            if (kin <= 0) kin += 260;
            let tone = kin % 13; if (tone === 0) tone = 13;
            let sealIndex = (kin - 1) % 20;
            let seal = solarSeals[sealIndex];
            document.getElementById('kin-display').innerText = "KIN " + kin;
            document.getElementById('kin-details').innerText = seal + " / 音" + tone;
        }
        updateKin();
    </script>

      window.difyChatbotConfig = { token: 'vNaNRHhOTuduR3K0', inputs: {} }

</body>
</html>
