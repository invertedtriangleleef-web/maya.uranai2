<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マヤ暦鑑定士 儷和（レイカ）- 公式サイト</title>
    <style>
        body { 
            font-family: 'Times New Roman', 'serif', 'Hiragino Mincho ProN'; 
            margin: 0; padding: 0; min-height: 100vh; color: #fff;
            /* 背景：夜のマヤ遺跡に固定 */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; flex-direction: column; align-items: center;
        }

        /* 大天使ハニエル（右上にひっそりと） */
        .angel-haniel {
            position: fixed; top: 15px; right: 15px; width: 90px; height: auto;
            opacity: 0.5; filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
            pointer-events: none; z-index: 100;
        }

        .container {
            max-width: 600px; width: 90%; margin: 60px auto; text-align: center; z-index: 10;
        }

        .kin-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 30px 15px;
            margin-bottom: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .kin-label { font-size: 0.9rem; letter-spacing: 0.4em; color: #a0ced9; }
        .kin-number { font-size: 3.5rem; font-weight: bold; margin: 10px 0; }
        .kin-details { font-size: 1.4rem; color: #fdfaf0; letter-spacing: 0.2em; }

        h1 { font-size: 1.8rem; margin-top: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .profile { font-size: 1rem; line-height: 1.8; margin-bottom: 40px; color: #f0f0f0; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            text-decoration: none; padding: 16px; border-radius: 50px; font-weight: bold;
            transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.4); text-align: center;
        }
        .btn-main { background: #d35400; color: white; border: none; box-shadow: 0 4px 15px rgba(211, 84, 0, 0.4); }
        .btn-sub { background: rgba(255, 255, 255, 0.2); color: white; }

        footer { margin-top: auto; padding: 30px; font-size: 0.75rem; color: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

    <img src="https://cdn.pixabay.com/photo/2014/04/02/10/47/angel-304562_1280.png" alt="Angel Haniel" class="angel-haniel">

    <div class="container">
        <div class="kin-card">
            <div class="kin-label">TODAY'S ENERGY</div>
            <div id="kin-display" class="kin-number">KIN ---</div>
            <div id="kin-details" class="kin-details">宇宙のリズムを読み解く</div>
        </div>

        <h1>マヤ暦鑑定士 儷和（レイカ）</h1>
        <div class="profile">
            宇宙の巡り、魂の航海図を読み解き、<br>
            あなたが本来の輝きを取り戻すお手伝いをいたします。<br>
            右下の案内人「マニク」も、あなたの旅をサポートします。
        </div>

        <div class="btn-group">
            <a href="#" class="btn btn-main">🔮 個人鑑定（準備中）</a>
            <a href="https://note.com/" target="_blank" class="btn btn-sub">📝 儷和のnote（準備中）</a>
        </div>
    </div>

    <footer>&copy; 2026 儷和 - Maya Galactic Calendar Guide</footer>

    <script>
        const solarSeals = ["赤い龍", "白い風", "青い夜", "黄色い種", "赤い蛇", "白い世界の橋渡し", "青い手", "黄色い星", "赤い月", "白い犬", "青い猿", "黄色い人", "赤い空歩く者", "白い魔法使い", "青い嵐", "黄色い太陽", "赤い地球", "白い鏡", "青い嵐", "黄色い戦士"];
        function updateKin() {
            const baseDate = new Date('2023-02-04'); 
            const today = new Date();
            const diff = Math.floor((today - baseDate) / (1000 * 60 * 60 * 24));
            let kin = (diff % 260) + 1;
            if (kin <= 0) kin += 260;
            let tone = kin % 13; if (tone === 0) tone = 13;
            let sealIndex = (kin - 1) % 20;
            let seal = solarSeals[sealIndex];
            document.getElementById('kin-display').innerText = "KIN " + kin;
            document.getElementById('kin-details').innerText = seal + " / 音" + tone;
        }
        updateKin();
    </script>

    <script src="https://udify.app/embed.min.js" id="z2Z7NNAQOtneOpv3" defer></script>
</body>
</html>
