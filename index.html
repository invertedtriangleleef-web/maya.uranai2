    <style>
        body {
            font-family: 'Times New Roman', 'serif', 'Hiragino Mincho ProN';
            margin: 0; padding: 0; min-height: 100vh; color: #fff;
            /* 背景：宇宙の深淵と黄金の光をイメージしたグラデーション */
            background: radial-gradient(circle at top right, #1c2541, #0b0d17),
                        linear-gradient(180deg, #0b0d17 0%, #1c2541 70%, #3a506b 100%);
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .container {
            max-width: 600px; width: 90%; margin: 80px auto 40px; text-align: center; z-index: 10;
        }

        /* KINカード：少し透明感を出して高級感を */
        .kin-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 40px 20px;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .kin-label { font-size: 0.85rem; letter-spacing: 0.5em; color: #a0ced9; text-transform: uppercase; }
        .kin-number { font-size: 3.8rem; font-weight: bold; margin: 15px 0; text-shadow: 0 0 20px rgba(255,255,255,0.3); }
        .kin-details { font-size: 1.5rem; color: #fdfaf0; letter-spacing: 0.15em; font-weight: 500; }

        h1 { font-size: 1.9rem; margin: 30px 0 10px; letter-spacing: 0.1em; color: #fdfaf0; }
        .profile { font-size: 1rem; line-height: 1.9; margin-bottom: 50px; color: #e0e1dd; }

        .btn-group { display: flex; flex-direction: column; gap: 18px; }
        .btn {
            text-decoration: none; padding: 18px; border-radius: 50px; font-weight: bold;
            transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.3); text-align: center;
            letter-spacing: 0.05em;
        }
        /* ボタン色：マヤの情熱（赤）と知性（青）の中間、深みのあるオレンジ */
        .btn-main { background: #d35400; color: white; border: none; box-shadow: 0 10px 20px rgba(211, 84, 0, 0.3); }
        .btn-sub { background: rgba(255, 255, 255, 0.12); color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-2px); }

        footer { margin-top: auto; padding: 40px; font-size: 0.75rem; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; }
    </style>
</head>
<body>

    <div class="container">
        <div class="kin-card">
            <div class="kin-label">— Today's Energy —</div>
            <div id="kin-display" class="kin-number">KIN ---</div>
            <div id="kin-details" class="kin-details">銀河の音と紋章</div>

    <script>
        const solarSeals = ["赤い龍", "白い風", "青い夜", "黄色い種", "赤い蛇", "白い世界の橋渡し", "青い手", "黄色い星", "赤い月", "白い犬", "青い猿", "黄色い人", "赤い空歩く者", "白い魔法使い", "青い嵐", "黄色い太陽", "赤い地球", "白い鏡", "青い夜明け", "黄色い戦士"];
        function updateKin() {
            const baseDate = new Date('2023-02-04');
            const today = new Date();
            const diff = Math.floor((today - baseDate) / (1000 * 60 * 60 * 24));
            let kin = (diff % 260) + 1;
            if (kin <= 0) kin += 260;
            let tone = kin % 13; if (tone === 0) tone = 13;
            let sealIndex = (kin - 1) % 20;
            let seal = solarSeals[sealIndex];
            document.getElementById('kin-display').innerText = "KIN " + kin;
            document.getElementById('kin-details').innerText = seal + " / 音" + tone;
        }
        updateKin();
    </script>
