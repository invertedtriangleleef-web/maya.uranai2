<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <title>マヤ暦アドバイザー 儷和（レイカ）- 公式サイト</title>
    <style>
        body {
            font-family: 'Times New Roman', 'serif', 'Hiragino Mincho ProN';
            margin: 0; padding: 0; min-height: 100vh; color: #4a4a4a;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
            /* 水彩風の黄色〜オレンジグラデーション背景 */
            background-color: #fdf3d0;
        }

        /* 水彩風背景レイヤー */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                /* 右上のオレンジぼかし */
                radial-gradient(ellipse 60% 50% at 90% 5%, rgba(255, 160, 60, 0.55) 0%, transparent 70%),
                /* 左下のオレンジぼかし */
                radial-gradient(ellipse 55% 45% at 5% 80%, rgba(255, 140, 30, 0.45) 0%, transparent 65%),
                /* 右下の黄色ぼかし */
                radial-gradient(ellipse 50% 40% at 85% 85%, rgba(255, 200, 60, 0.4) 0%, transparent 60%),
                /* 左上の薄い黄色 */
                radial-gradient(ellipse 45% 35% at 10% 15%, rgba(255, 220, 100, 0.35) 0%, transparent 60%),
                /* 中央の白いハイライト */
                radial-gradient(ellipse 50% 60% at 50% 40%, rgba(255, 255, 255, 0.85) 0%, transparent 65%),
                /* ベースグラデーション */
                linear-gradient(160deg, #fde8a0 0%, #fdf3d0 35%, #fff8e8 55%, #fde8a0 100%);
            z-index: 0;
        }

        /* 追加のぼかしアクセント */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse 30% 25% at 75% 30%, rgba(255, 120, 20, 0.2) 0%, transparent 70%),
                radial-gradient(ellipse 25% 20% at 20% 60%, rgba(255, 180, 40, 0.2) 0%, transparent 70%);
            z-index: 0;
        }

        .container {
            max-width: 600px; width: 90%;
            margin: 60px auto 40px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .kin-card {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            padding: 30px 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(200, 130, 30, 0.1);
        }

        .kin-label {
            font-size: 0.8rem;
            letter-spacing: 0.4em;
            color: #8d6e63;
            text-transform: uppercase;
        }

        .kin-number {
            font-size: 3.5rem;
            font-weight: bold;
            margin: 10px 0;
            color: #5d4037;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.9);
        }

        .kin-details {
            font-size: 1.4rem;
            color: #5d4037;
            letter-spacing: 0.1em;
        }

        h1 {
            font-size: 1.6rem;
            margin: 25px 0 10px;
            color: #3e2723;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.9);
        }

        .title-sub {
            font-size: 0.9rem;
            display: block;
            margin-bottom: 5px;
            color: #8d6e63;
            font-weight: bold;
        }

        .profile {
            font-size: 0.95rem;
            line-height: 1.9;
            margin-bottom: 40px;
            color: #4e342e;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .btn-main {
            background: #e6a11e;
            color: white;
            border: none;
            box-shadow: 0 5px 15px rgba(230, 161, 30, 0.35);
        }

        .btn-main:hover {
            background: #d4941a;
            transform: translateY(-2px);
        }

        .btn-sub {
            background: rgba(255, 255, 255, 0.45);
            color: #5d4037;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .btn-sub:hover {
            background: rgba(255, 255, 255, 0.65);
        }

        footer {
            margin-top: auto;
            padding: 30px;
            font-size: 0.7rem;
            color: #8d6e63;
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="kin-card">
            <div class="kin-label">— Today's Energy —</div>
            <div id="kin-display" class="kin-number">KIN ---</div>
            <div id="kin-details" class="kin-details">銀河の音と紋章</div>

        <div class="btn-group">

    <script>
        const solarSeals = ["赤い龍", "白い風", "青い夜", "黄色い種", "赤い蛇", "白い世界の橋渡し", "青い手", "黄色い星", "赤い月", "白い犬", "青い猿", "黄色い人", "赤い空歩く者", "白い魔法使い", "青い嵐", "黄色い太陽", "赤い地球", "白い鏡", "青い夜明け", "黄色い戦士"];
        function updateKin() {
            const baseDate = new Date('2023-02-04');
            const today = new Date();
            const diff = Math.floor((today - baseDate) / (1000 * 60 * 60 * 24));
            let kin = (diff % 260) + 1;
            if (kin <= 0) kin += 260;
            let tone = kin % 13; if (tone === 0) tone = 13;
            let sealIndex = (kin - 1) % 20;
            let seal = solarSeals[sealIndex];
            document.getElementById('kin-display').innerText = "KIN " + kin;
            document.getElementById('kin-details').innerText = seal + " / 音" + tone;
        }
        updateKin();
    </script>

</html>
